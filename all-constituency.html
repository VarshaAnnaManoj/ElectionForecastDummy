<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Constituency</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="allconst-shell">
    <header class="hero allconst-hero">
      <a href="home.html" class="back-home" title="Back to home">Back</a>
      <div>
        <div class="hero-brand">
          <p class="hero-logo-caption">Election Forecast</p>
        </div>
        <h1>AllConstituency</h1>
        <p>District, constituency, winner, margin, vote share and quick details in one page.</p>
      </div>
    </header>

    <section class="allconst-board" aria-label="All constituency entries">
      <div class="allconst-toolbar">
        <h2>All Constituencies</h2>
        <p id="allconst-count">0 rows</p>
      </div>
      <div id="allconst-list" class="allconst-list"></div>
    </section>
  </main>

  <div id="mini-popup" class="mini-popup hidden" aria-hidden="true">
    <div class="mini-popup-panel" role="dialog" aria-modal="true" aria-labelledby="mini-popup-title">
      <button id="mini-popup-close" class="modal-close" aria-label="Close details">x</button>
      <h3 id="mini-popup-title">Details</h3>
      <div id="mini-popup-content" class="mini-popup-content"></div>
    </div>
  </div>

  <script src="all-constituency.js"></script>
</body>
</html>
